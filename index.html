<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чувствительность для Free Fire</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1 class="site-title">Чувствительность для Free Fire</h1>
        <div class="designer-credit">
            <span>Designed by: Esbergen Erdaulet</span>
        </div>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск по модели телефона...">
        </div>

        <div class="phone-list" id="phoneList">
            <!-- Список телефонов будет сгенерирован здесь -->
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Настройки для: <span id="selectedPhoneName"></span></h2>
            <div id="sensitivitySettings">
                <!-- Настройки будут загружены сюда -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
